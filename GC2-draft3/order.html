<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Wheel</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>

<body>

<section id="header">
    <a href="#"><img src="img/logo.png" class="logo" alt=""></a>

    <ul id="navbar">
        <li><a href="index.htm">HOME</a></li>
        <li><a href="about.htm">ABOUT US</a></li>
        <li><a href="menu.htm">MENU</a></li>
        <li><a class="active" href="order.html">ORDER FORM</a></li>
        <li><a href="checkout.html"><i class="fa-solid fa-cart-shopping"></i></a></li>
    </ul>
</section>

<section id="order-header">
        <h2>Order Yours Now!</h2>
        <p>Pick your plan, we’ll take care of the rest.</p>

</section>

<form action="#" method="post" onsubmit="return confirmAddToCart()">

    <!-- Contact -->
    <section>
        <h4>Contact Details</h4>

        <input type="text" name="firstname" placeholder="First Name" required><br><br>
        <input type="text" name="lastname" placeholder="Last Name" required><br><br>
        <input type="tel" name="contactnumber" placeholder="Contact Number" required><br><br>
        <textarea name="address" placeholder="Address" required></textarea>
    </section>

    <!-- Program -->
    <section>
        <h4>Program Type</h4>

        <select id="program" name="program" onchange="updateCalories()" required>
            <option value="">-- Select Program --</option>
            <option value="low_calorie">Low Calorie</option>
            <option value="high_protein">High Protein</option>
            <option value="keto">Keto</option>
            <option value="low_salt_fat">Low Salt, Low Fat</option>
            <option value="endurance">Endurance</option>
            <option value="strength">Strength</option>
        </select>

        <br><br>

        <h4>Calories</h4>
        <select id="calories" name="calories" required>
            <option value="">-- Select Calories --</option>
        </select>
    </section>

    <!-- Inclusions -->
    <section>
        <h4>Inclusions</h4>

        <input type="checkbox" name="inclusions[]" value="breakfast"> Breakfast<br>
        <input type="checkbox" name="inclusions[]" value="lunch"> Lunch<br>
        <input type="checkbox" name="inclusions[]" value="dinner"> Dinner<br>
        <input type="checkbox" name="inclusions[]" value="snack"> Snack
    </section>

    <!-- Pax -->
    <section>
        <h4>Quantity (Pax)</h4>
        <input type="number" name="pax" min="1" value="1" required>
    </section>

    <!-- Restrictions -->
    <section>
        <h4>Restrictions</h4>
        <textarea name="restrictions" placeholder="e.g. No peanuts, vegetarian..."></textarea>
    </section>

    <!-- Delivery Time -->
    <section>
        <h4>Delivery Time</h4>
        <input type="radio" name="delivery_time" value="morning" required> Morning<br>
        <input type="radio" name="delivery_time" value="night"> Night
    </section>

    <!-- Dates -->
    <section>
        <h4>Delivery Duration</h4>

        <label>Start Date:</label><br>
        <input type="date" id="start" name="start_date" required><br><br>

        <label>End Date:</label><br>
        <input type="date" id="end" name="end_date" required>
    </section>

    <br>

    <!-- Button -->
    <button type="submit">Add to Cart</button>

</form>

<script src="script.js"></script>

</body>
</html>
