<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Wheel | Order Form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>
<section id="header">
    <a href="index.htm"><img src="img/logo.png" class="logo" alt="Kitchen Wheel logo"></a>
    <ul id="navbar">
        <li><a href="index.htm">HOME</a></li>
        <li><a href="about.htm">ABOUT US</a></li>
        <li><a href="menu.htm">MENU</a></li>
        <li><a class="active" href="order.html">ORDER FORM</a></li>
        <li><a href="checkout.html"><i class="fa-solid fa-cart-shopping"></i></a></li>
    </ul>
</section>

<section id="order-header">
    <h2>Order Yours Now!</h2>
</section>

<form id="orderForm" novalidate>
    <section>
        <h4>Contact Details</h4>
        <input type="text" id="firstname" name="firstname" placeholder="First Name" required>
        <input type="text" id="lastname" name="lastname" placeholder="Last Name" required>

        <div class="phone-group">
            <span class="phone-prefix">+63</span>
            <input type="tel" id="contactnumber" name="contactnumber" placeholder="9XXXXXXXXX" maxlength="10" inputmode="numeric" required>
        </div>

        <select id="city" name="city" required>
            <option value="">-- Select Delivery Area --</option>
            <option value="Katipunan">Katipunan</option>
            <option value="España">España</option>
            <option value="Taft">Taft</option>
            <option value="Mendiola">Mendiola</option>
            <option value="Sampaloc">Sampaloc</option>
        </select>

        <input type="text" id="streetAddress" name="streetAddress" placeholder="Street Address / Building / Unit Number" required>
    </section>

    <section>
        <h4>Program Type</h4>
        <select id="program" name="program" required>
            <option value="">-- Select Program --</option>
            <option value="low_calorie">Low Calorie</option>
            <option value="high_protein">High Protein</option>
            <option value="keto">Keto</option>
            <option value="low_salt_fat">Low Salt, Low Fat</option>
            <option value="endurance">Endurance</option>
            <option value="strength">Strength</option>
        </select>

        <h4>Calories</h4>
        <select id="calories" name="calories" required>
            <option value="">-- Select Calories --</option>
        </select>
    </section>

    <section>
        <h4>Inclusions</h4>
        <div class="choices-grid">
            <label><input type="checkbox" name="inclusions" value="Breakfast"> Breakfast</label>
            <label><input type="checkbox" name="inclusions" value="Lunch"> Lunch</label>
            <label><input type="checkbox" name="inclusions" value="Dinner"> Dinner</label>
            <label><input type="checkbox" name="inclusions" value="Snack"> Snack</label>
        </div>
    </section>

    <section>
        <h4>Quantity (Pax)</h4>
        <input type="number" id="pax" name="pax" min="1" value="1" required>
    </section>

    <section>
        <h4>Restrictions / Notes</h4>
        <textarea id="restrictions" name="restrictions" placeholder="e.g. No peanuts, vegetarian, no dairy"></textarea>
    </section>

    <section>
        <h4>Delivery Time</h4>
            <label> <input type="radio" name="delivery_time" value="morning" required>
                Morning Delivery <small>(6:00 AM - 10:00 AM)</small>
            </label>
            <br>
            <label> <input type="radio" name="delivery_time" value="evening">
                Evening Delivery <small>(5:00 PM - 9:00 PM)</small>
            </label>
    </section>

    <section>
        <h4>Delivery Duration</h4>
        <label for="start">Start Date</label>
        <input type="date" id="start" name="start_date" required>

        <label for="end">End Date</label>
        <input type="date" id="end" name="end_date" required>
    </section>

    <section class="summary-box order-summary">
        <h4>Order Summary</h4>
        <p>Price per day: <strong>₱<span id="pricePerDay">0.00</span></strong></p>
        <p>Estimated shipping: <strong>₱<span id="shippingFee">0.00</span></strong></p>
        <p>Estimated total: <strong>₱<span id="estimatedTotal">0.00</span></strong></p>
    </section>

    <button type="submit">Add to Cart</button>
</form>

<script src="script.js"></script>
</body>
</html>
